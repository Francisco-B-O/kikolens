services:
  kikolens:
    build: .
    container_name: kikolens_app
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped
    volumes:
      - ./kikolens_output:/app/kikolens_output

  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: kikolens_ollama
    ports:
      - "11434:11434"
    environment:
      # Cambia el modelo aquí si lo necesitas (ej: llama3.1, llama3.2:1b)
      - OLLAMA_MODEL=llama3.2
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
